<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Resilience &amp; Disaster Recovery for Dubai Businesses — ITSEC</title>
<link rel="icon" type="image/png" href="asset/ITSEC%20Icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ITSEC KEYNOTE v4 — bespoke animated scenes, brand-true
   ============================================================ */
:root{
  --orange:#f7791f; --orange2:#ff9d52; --ember:#e2511c;
  --royal:#0d5fb5; --sky:#2aa4f4; --navy:#0a2c66; --ink:#061227;
  --bg:#04060d; --panel:rgba(12,22,44,.62); --pb:rgba(42,164,244,.18);
  --text:#e8eefc; --muted:#93a6c8; --line:rgba(42,164,244,.12);
  --glow:0 0 26px rgba(42,164,244,.3); --glowO:0 0 26px rgba(247,121,31,.34);
  --grad:linear-gradient(135deg,var(--orange),var(--royal));
  --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  --font:'Space Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}

/* dim cyber background */
#bg{position:fixed;inset:0;z-index:0;background:
   radial-gradient(1300px 760px at 82% -14%,rgba(42,164,244,.12),transparent 58%),
   radial-gradient(1000px 660px at 4% 116%,rgba(247,121,31,.07),transparent 58%),
   linear-gradient(165deg,#03050b 0%,#050a16 48%,#07112a 100%);}
#net{position:fixed;inset:0;z-index:1;opacity:.36}
#grid{position:fixed;inset:0;z-index:1;opacity:.2;background-image:
   linear-gradient(rgba(42,164,244,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(42,164,244,.07) 1px,transparent 1px);
   background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 50% 36%,#000 0%,transparent 74%);mask-image:radial-gradient(circle at 50% 36%,#000 0%,transparent 74%);}
#vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(120% 120% at 50% 42%,transparent 50%,rgba(0,0,0,.62) 100%)}
.scan{position:fixed;left:0;right:0;height:1px;z-index:3;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(42,164,244,.45),transparent);animation:scan 11s linear infinite;opacity:.28}
@keyframes scan{0%{top:-5%}100%{top:105%}}

/* stage */
#stage{position:relative;z-index:5;height:100vh;width:100vw}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;padding:6vh 7vw 12vh;opacity:0;transform:translateY(26px);transition:opacity .55s ease,transform .55s ease}
.slide.active{display:flex;opacity:1;transform:none}
.slide.leaving{display:flex;opacity:0;transform:translateY(-26px)}
.slide.active .reveal{animation:rise .75s cubic-bezier(.2,.7,.2,1) both}
.slide.active .reveal:nth-child(1){animation-delay:.04s}.slide.active .reveal:nth-child(2){animation-delay:.13s}
.slide.active .reveal:nth-child(3){animation-delay:.24s}.slide.active .reveal:nth-child(4){animation-delay:.35s}.slide.active .reveal:nth-child(5){animation-delay:.45s}
@keyframes rise{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.idx{position:absolute;top:7vh;right:6vw;font-size:17vw;font-weight:700;line-height:1;color:rgba(42,164,244,.045);z-index:0;pointer-events:none;letter-spacing:-.04em;user-select:none}

/* cascade */
.cascade>*{opacity:0}
.slide.active .cascade>*{animation:pop .55s cubic-bezier(.2,.8,.2,1) forwards}
.cascade>*:nth-child(1){animation-delay:.18s}.cascade>*:nth-child(2){animation-delay:.25s}.cascade>*:nth-child(3){animation-delay:.32s}
.cascade>*:nth-child(4){animation-delay:.39s}.cascade>*:nth-child(5){animation-delay:.46s}.cascade>*:nth-child(6){animation-delay:.53s}
.cascade>*:nth-child(7){animation-delay:.60s}.cascade>*:nth-child(8){animation-delay:.67s}.cascade>*:nth-child(9){animation-delay:.74s}
.cascade>*:nth-child(10){animation-delay:.81s}.cascade>*:nth-child(11){animation-delay:.88s}.cascade>*:nth-child(12){animation-delay:.95s}
@keyframes pop{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* type */
.kicker{display:inline-flex;align-items:center;gap:.7rem;font-size:.92rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sky);font-weight:600;margin-bottom:1.1rem;z-index:2}
.kicker::before{content:"";width:46px;height:2px;background:var(--grad)}
h1{font-size:clamp(2.8rem,6.2vw,5.8rem);line-height:.98;font-weight:700;letter-spacing:-.025em}
h2{font-size:clamp(2.1rem,4.5vw,3.9rem);line-height:1.02;font-weight:700;letter-spacing:-.02em;margin-bottom:.8rem;z-index:2}
.hl{background:linear-gradient(100deg,var(--sky),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{font-size:clamp(1.2rem,1.9vw,1.7rem);color:var(--text);max-width:34ch;line-height:1.3;font-weight:500}
.sub{color:var(--muted);font-size:clamp(1.1rem,1.6vw,1.5rem);max-width:48ch;line-height:1.45;margin-top:.4rem;font-weight:400}
.note{color:var(--orange2);font-weight:600}
.two{display:grid;grid-template-columns:.92fr 1.08fr;gap:3rem;align-items:center;width:100%;z-index:2}
@media(max-width:1100px){.two{grid-template-columns:1fr}}

/* ---- generic feature card (used sparingly) ---- */
.grid{display:grid;gap:1.2rem;margin-top:1.7rem;width:100%;z-index:2}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.fcard{position:relative;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:.5rem;background:linear-gradient(165deg,rgba(14,26,52,.78),rgba(8,16,34,.5));
   border:1px solid var(--pb);border-radius:18px;padding:1.4rem 1.4rem 1.25rem;color:#fff;font-family:inherit;backdrop-filter:blur(10px);overflow:hidden;will-change:transform;transition:transform .25s,border-color .25s,box-shadow .25s}
.fcard::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--grad);opacity:.85}
.fcard::after{content:"";position:absolute;inset:0;border-radius:18px;pointer-events:none;background:radial-gradient(340px 190px at var(--mx,50%) var(--my,0%),rgba(42,164,244,.16),transparent 70%);opacity:0;transition:opacity .3s}
.fcard:hover{border-color:var(--sky);box-shadow:var(--glow)}.fcard:hover::after{opacity:1}
.fcard .ic{display:grid;place-items:center;width:52px;height:52px;border-radius:13px;font-size:1.6rem;background:rgba(42,164,244,.1);border:1px solid var(--pb);color:var(--sky);transition:transform .3s}
.fcard:hover .ic{transform:scale(1.08) rotate(-5deg)}
.fcard h3{font-size:clamp(1.08rem,1.4vw,1.38rem);font-weight:600;color:#fff;line-height:1.12}
.fcard p{font-size:clamp(.92rem,1.05vw,1.08rem);color:var(--muted);line-height:1.38;flex:1}
.fcard .explore{margin-top:.35rem;display:inline-flex;align-items:center;gap:.5rem;align-self:flex-start;font-size:.85rem;font-weight:600;color:var(--sky);padding:.4rem .85rem;border-radius:999px;background:rgba(42,164,244,.1);border:1px solid var(--pb);transition:.25s}
.fcard:hover .explore{gap:.8rem;background:rgba(42,164,244,.2);color:#fff}.fcard .explore i{font-style:normal;transition:.25s}.fcard:hover .explore i{transform:translateX(4px)}
.fcard.o::before{background:linear-gradient(135deg,var(--orange),var(--ember))}.fcard.o::after{background:radial-gradient(340px 190px at var(--mx,50%) var(--my,0%),rgba(247,121,31,.18),transparent 70%)}
.fcard.o:hover{border-color:var(--orange);box-shadow:var(--glowO)}.fcard.o .ic{background:rgba(247,121,31,.12);border-color:rgba(247,121,31,.3);color:var(--orange2)}
.fcard.o .explore{color:var(--orange2);background:rgba(247,121,31,.1);border-color:rgba(247,121,31,.3)}.fcard.o:hover .explore{background:rgba(247,121,31,.22);color:#fff}

/* ============ SCENE: COVER ============ */
.cover{align-items:flex-start;justify-content:center}
/* connected-node cybersecurity network */
.cybernet{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.cover .hero-mark,.cover h1,.cover .sub,.cover .kicker,.cover .cta,.cover .footerline,.cover .partners{position:relative;z-index:2}
.cover .hero-mark{z-index:1}
/* ============ SCENE: END / Q&A ============ */
.endslide{padding:0}
.endslide .cybernet{z-index:0}
.end-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;width:100%;max-width:920px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 6vw}
.endslide .end-mark{width:clamp(72px,12vh,124px);margin:0 0 1.4vh;filter:drop-shadow(0 0 45px rgba(42,164,244,.5));animation:endIn 1.1s cubic-bezier(.2,.85,.25,1) both,endFloat 6s ease-in-out 1.1s infinite,heroGlow 4.5s ease-in-out infinite}
@keyframes endIn{0%{opacity:0;transform:scale(.35) rotate(-45deg)}60%{opacity:1}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes endFloat{0%,100%{transform:translateY(0) rotate(0) scale(1)}50%{transform:translateY(-10px) rotate(3deg) scale(1.04)}}
.endslide .kicker{margin:0}
.endslide h1{max-width:none;font-size:clamp(2rem,5.2vh,3.6rem);line-height:1.02;margin:.8vh 0 0}
.endslide .sub{margin-top:.8vh}
.endslide .footerline{justify-content:center;margin-top:2vh}
.end-partners{margin-top:2.2vh;flex-direction:column;gap:.7rem;align-items:center}
.end-partners .plabel{text-align:center}
.cover .hero-mark{position:absolute;right:7vw;top:50%;width:min(22vw,300px);filter:drop-shadow(0 0 50px rgba(42,164,244,.45));animation:heroIn 1.2s cubic-bezier(.2,.85,.25,1) both,heroFloat 7s ease-in-out 1.2s infinite,heroGlow 4.5s ease-in-out infinite}
@keyframes heroIn{0%{opacity:0;transform:translateY(-50%) scale(.35) rotate(-45deg)}60%{opacity:1}100%{opacity:1;transform:translateY(-50%) scale(1) rotate(0)}}
@keyframes heroFloat{0%,100%{transform:translateY(-50%) rotate(0) scale(1)}50%{transform:translateY(-57%) rotate(3.5deg) scale(1.035)}}
@keyframes heroGlow{0%,100%{filter:drop-shadow(0 0 35px rgba(42,164,244,.35))}50%{filter:drop-shadow(0 0 70px rgba(247,121,31,.45))}}
@media(max-width:1100px){.cover .hero-mark{display:none}}
.cover h1{max-width:17ch}
/* cover partner logos */
.partners{margin-top:1.9rem;display:flex;align-items:center;gap:1.1rem;flex-wrap:wrap;z-index:2}
.partners .plabel{color:var(--muted);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase}
.plogos{display:flex;align-items:center;gap:.9rem}
.pchip{background:#fff;border-radius:12px;padding:7px;width:130px;justify-content:center;display:inline-flex;align-items:center;box-shadow:0 6px 24px rgba(0,0,0,.4);transition:.25s}
.pchip:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(42,164,244,.4)}
.pchip img{height:64px;width:auto;display:block}
.footerline{margin-top:2.3rem;display:flex;flex-wrap:wrap;gap:1.5rem;align-items:center;color:var(--muted);font-size:1.12rem;z-index:2}
.footerline .who{color:#fff;font-weight:600}.dot-sep{width:7px;height:7px;border-radius:50%;background:var(--orange)}
.cta{margin-top:2.2rem;display:inline-flex;align-items:center;gap:.7rem;cursor:pointer;padding:1rem 1.9rem;border-radius:999px;font-size:1.1rem;font-weight:600;color:#04060d;font-family:inherit;background:var(--grad);border:0;box-shadow:var(--glow);transition:.25s;z-index:2}
.cta:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 0 46px rgba(42,164,244,.55)}

/* ============ SCENE: RADAR (slide 3) ============ */
.radarwrap{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;width:100%;margin-top:1.4rem;z-index:2}
@media(max-width:1100px){.radarwrap{grid-template-columns:1fr}}
.radar{position:relative;width:100%;max-width:440px;margin-inline:auto;aspect-ratio:1}
.radar svg{width:100%;height:100%}
.sweep{transform-origin:200px 200px;animation:spin 3.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.blip{animation:blip 2.4s ease-in-out infinite}@keyframes blip{0%,100%{opacity:.25}50%{opacity:1}}
.ping{transform-origin:center;animation:ping 3s ease-out infinite}@keyframes ping{0%{opacity:.8;transform:scale(.2)}100%{opacity:0;transform:scale(1)}}
.rstats{display:grid;gap:.8rem}
.rstat{position:relative;display:flex;align-items:center;gap:1.1rem;padding:1rem 1.2rem;border:1px solid var(--pb);border-radius:14px;background:linear-gradient(165deg,rgba(14,26,52,.7),rgba(8,16,34,.4));cursor:pointer;text-align:left;color:#fff;font-family:inherit;transition:.25s;overflow:hidden}
.rstat:hover{transform:translateX(8px);border-color:var(--sky);box-shadow:var(--glow)}
.rstat .big{font-size:clamp(1.7rem,2.8vw,2.6rem);font-weight:700;line-height:1;min-width:3.4ch;background:linear-gradient(120deg,var(--sky),#fff);-webkit-background-clip:text;background-clip:text;color:transparent}
.rstat.o .big{background:linear-gradient(120deg,var(--orange2),#fff);-webkit-background-clip:text;background-clip:text;color:transparent}
.rstat .cap{color:var(--muted);font-size:1.02rem;line-height:1.3}
.rstat::after{content:"›";position:absolute;right:1rem;color:var(--sky);font-size:1.5rem;opacity:.4}

/* ============ SCENE: HEX HONEYCOMB (slide 4) ============ */
.hexgrid{display:flex;justify-content:center;gap:1.4rem;margin-top:1.6rem;z-index:2}
.hexcol{display:flex;flex-direction:column;gap:1.4rem}
.hexcol:nth-child(2){margin-top:4.4rem}
.hex{position:relative;width:clamp(180px,15vw,230px);aspect-ratio:1/1.1;cursor:pointer;border:0;background:none;font-family:inherit;padding:0;color:#fff}
.hex .face{position:absolute;inset:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
   background:linear-gradient(165deg,rgba(14,26,52,.92),rgba(8,16,34,.7));border:1px solid transparent;
   display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;text-align:center;padding:1.4rem;transition:.28s}
.hex::before{content:"";position:absolute;inset:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:var(--grad);opacity:.45;transition:.28s}
.hex .face{margin:2px}
.hex:hover{transform:translateY(-8px) scale(1.03)}
.hex:hover::before{opacity:1}
.hex.o::before{background:linear-gradient(135deg,var(--orange),var(--ember))}
.hex .ic{font-size:2rem}
.hex h4{font-size:1.12rem;font-weight:600;line-height:1.1}
.hex small{color:var(--muted);font-size:.86rem}
@media(max-width:900px){.hexcol:nth-child(2){margin-top:0}.hexgrid{flex-wrap:wrap}}

/* ============ SCENE: ORBIT (slides 6,18,28) ============ */
.orbit{position:relative;width:min(680px,74vw);margin:1.4rem auto 0;aspect-ratio:1/.8;z-index:2}
.orbit .olines{position:absolute;inset:0;width:100%;height:100%}
.flowline{stroke:rgba(42,164,244,.4);stroke-width:1.6;stroke-dasharray:5 7;animation:flow 1.3s linear infinite}
.flowline.o{stroke:rgba(247,121,31,.45)}
@keyframes flow{to{stroke-dashoffset:-24}}
.ocore{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:clamp(120px,14vw,168px);aspect-ratio:1;border-radius:50%;
   display:grid;place-items:center;text-align:center;gap:.2rem;border:1px solid var(--pb);background:radial-gradient(circle at 50% 35%,rgba(42,164,244,.18),rgba(8,16,34,.92));z-index:3;box-shadow:var(--glow)}
.ocore .ci{font-size:2.1rem}.ocore b{font-size:1rem;font-weight:600;letter-spacing:.02em}.ocore small{color:var(--muted);font-size:.74rem;letter-spacing:.16em;text-transform:uppercase}
.ocore.pulse{animation:corepulse 3s ease-in-out infinite}@keyframes corepulse{0%,100%{box-shadow:0 0 0 0 rgba(42,164,244,.32)}50%{box-shadow:0 0 0 16px rgba(42,164,244,0)}}
.ocore img{width:70%}
.onode{position:absolute;transform:translate(-50%,-50%);width:clamp(98px,10vw,130px);padding:.85rem .6rem;border-radius:14px;cursor:pointer;text-align:center;color:#fff;font-family:inherit;z-index:4;
   border:1px solid var(--pb);background:linear-gradient(165deg,rgba(14,26,52,.95),rgba(8,16,34,.8));transition:.25s}
.onode:hover{border-color:var(--sky);box-shadow:var(--glow);transform:translate(-50%,-50%) scale(1.08)}
.onode.o:hover{border-color:var(--orange);box-shadow:var(--glowO)}
.onode .oi{font-size:1.5rem;display:block;margin-bottom:.2rem}.onode h5{font-size:.95rem;font-weight:600;line-height:1.1}
@media(max-width:900px){.orbit{display:none}}
/* fallback grid for small screens */
.orbit-fallback{display:none}@media(max-width:900px){.orbit-fallback{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.4rem}}

/* ============ SCENE: CONVERGENCE MAP (slide 8) ============ */
.cmap{position:relative;width:100%;margin-top:1.4rem;aspect-ratio:2.1/1;z-index:2;max-height:54vh}
.cmap svg{position:absolute;inset:0;width:100%;height:100%}
.csrc{position:absolute;transform:translate(0,-50%);left:1%;width:clamp(140px,15vw,200px);padding:.7rem .9rem;border-radius:12px;cursor:pointer;color:#fff;font-family:inherit;text-align:left;
   border:1px solid rgba(247,121,31,.3);background:linear-gradient(165deg,rgba(34,18,10,.9),rgba(14,10,8,.7));transition:.25s;display:flex;gap:.6rem;align-items:center}
.csrc:hover{transform:translate(6px,-50%);border-color:var(--orange);box-shadow:var(--glowO)}
.csrc .si{font-size:1.3rem}.csrc h5{font-size:.95rem;font-weight:600;line-height:1.1}
.ccore{position:absolute;right:1%;top:50%;transform:translate(0,-50%);width:clamp(130px,13vw,170px);aspect-ratio:1;border-radius:18px;display:grid;place-items:center;text-align:center;gap:.2rem;
   border:1px solid var(--pb);background:radial-gradient(circle at 50% 35%,rgba(42,164,244,.2),rgba(8,16,34,.95));z-index:3;box-shadow:var(--glow);animation:corepulse 3s ease-in-out infinite}
.ccore .ci{font-size:1.9rem}.ccore b{font-size:.95rem}.ccore small{color:var(--muted);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase}
@media(max-width:900px){.cmap{display:none}}

/* ============ SCENE: TERMINAL (slide 11) ============ */
.terminal{margin-top:1.6rem;width:100%;max-width:1000px;border-radius:16px;overflow:hidden;border:1px solid rgba(226,81,28,.35);background:rgba(6,8,14,.92);box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 40px rgba(226,81,28,.12);z-index:2}
.term-bar{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;background:rgba(20,12,10,.9);border-bottom:1px solid rgba(226,81,28,.25)}
.term-bar .td{width:12px;height:12px;border-radius:50%}.td.r{background:#ff5f56}.td.y{background:#ffbd2e}.td.g{background:#27c93f}
.term-bar .tt{margin-left:.8rem;font-family:var(--mono);font-size:.86rem;color:#ff9d6b}
.term-body{padding:1.4rem 1.6rem;font-family:var(--mono);font-size:clamp(.92rem,1.15vw,1.12rem);display:grid;gap:.5rem;line-height:1.5}
.tline{display:flex;align-items:center;gap:.7rem;cursor:pointer;background:none;border:0;font-family:inherit;color:#d7e3f5;text-align:left;padding:.35rem .5rem;border-radius:8px;transition:.18s;width:100%}
.tline:hover{background:rgba(247,121,31,.1)}
.tline .pr{color:#27c93f}.tline .seq{color:#ff9d6b;font-weight:600}.tline .cmd{color:#e8eefc}
.tline .hintx{margin-left:auto;color:#5f7a9c;font-size:.78rem;opacity:0;transition:.18s}.tline:hover .hintx{opacity:1;color:var(--orange2)}
.term-cursor{font-family:var(--mono);color:#27c93f;animation:cursor 1s steps(1) infinite}@keyframes cursor{50%{opacity:0}}

/* ============ SCENE: SHIELD note uses ORBIT ============ */

/* ============ SCENE: STACK LAYERS (slide 19) ============ */
.stack{display:grid;gap:1rem;margin-top:1.6rem;width:100%;max-width:1000px;z-index:2}
.slayer{position:relative;display:flex;align-items:center;gap:1.4rem;padding:1.5rem 1.8rem;border-radius:16px;cursor:pointer;color:#fff;font-family:inherit;text-align:left;
   border:1px solid var(--pb);background:linear-gradient(100deg,rgba(14,26,52,.8),rgba(8,16,34,.45));transition:.25s;overflow:hidden}
.slayer::before{content:"";position:absolute;left:0;top:0;height:100%;width:5px;background:var(--grad)}
.slayer:hover{transform:translateX(10px);border-color:var(--sky);box-shadow:var(--glow)}
.slayer .ln{font-size:2.4rem;font-weight:700;color:rgba(42,164,244,.5);min-width:1.6ch}
.slayer .si{font-size:2rem}.slayer h3{font-size:1.4rem;font-weight:600}.slayer p{color:var(--muted);font-size:1.05rem;margin-top:.2rem}

.poll .fill{position:absolute;inset:0;width:0;background:linear-gradient(90deg,rgba(42,164,244,.34),rgba(247,121,31,.3));transition:width .9s cubic-bezier(.2,.8,.2,1)}
.poll .row{position:relative;display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.2rem;font-size:1.1rem}.poll .pct{font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.pollwrap{display:grid;grid-template-columns:1fr 1fr;gap:2.4rem;margin-top:1.5rem;z-index:2}@media(max-width:1100px){.pollwrap{grid-template-columns:1fr}}.pollwrap h3{color:var(--sky);font-size:1.2rem;margin-bottom:.5rem;font-weight:600}
@media(max-width:900px){.g3,.g4{grid-template-columns:1fr 1fr}.duo,.gauges{grid-template-columns:1fr}.m-panel{padding:2rem 1.5rem}.two{gap:1.6rem}}

/* ============ SCENE 24: 30-DAY JOURNEY (animated step timeline) ============ */
.journey{position:relative;width:100%;margin-top:3.6rem;z-index:2}
.journey .jline{position:absolute;left:12.5%;right:12.5%;top:35px;height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.journey .jfill{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,var(--royal),var(--sky),var(--orange2),var(--orange))}
.journey.play .jfill{animation:jfill 1.9s cubic-bezier(.4,0,.2,1) .35s forwards}
@keyframes jfill{to{width:100%}}
.jsteps{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4rem}
.jstep{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.38rem;padding:0 .3rem;cursor:pointer;color:#fff;font-family:inherit;background:none;border:0;opacity:0;transform:translateY(24px)}
.journey.play .jstep{animation:jrise .6s cubic-bezier(.2,.8,.2,1) forwards;animation-delay:calc(.45s + var(--d)*.42s)}
@keyframes jrise{to{opacity:1;transform:none}}
.jnode{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;position:relative;z-index:2;border:2px solid var(--sky);background:radial-gradient(circle at 36% 30%,rgba(42,164,244,.4),rgba(9,18,38,.95));box-shadow:0 0 0 7px rgba(42,164,244,.09),var(--glow);transition:transform .3s,box-shadow .3s}
.jstep.o .jnode{border-color:var(--orange);background:radial-gradient(circle at 36% 30%,rgba(247,121,31,.4),rgba(9,18,38,.95));box-shadow:0 0 0 7px rgba(247,121,31,.09),var(--glowO)}
.jnum{font-family:var(--mono);font-weight:700;font-size:1.5rem;color:#fff}
.jicon{font-size:1.55rem;margin-top:.55rem}
.jwk{font-size:.72rem;letter-spacing:.2em;color:var(--orange2);font-weight:700}
.jstep h3{font-size:1.28rem;font-weight:600;margin:.05rem 0}
.jstep p{color:var(--muted);font-size:.95rem;line-height:1.34;max-width:25ch}
.jtap{margin-top:.3rem;font-size:.8rem;font-weight:600;color:var(--sky);letter-spacing:.02em;opacity:.8;transition:.25s}
.jstep.o .jtap{color:var(--orange2)}
.jstep:hover .jnode{transform:translateY(-7px) scale(1.07)}
.jstep:hover .jtap{opacity:1;letter-spacing:.08em}
.jgoal{margin-top:2.6rem;text-align:center;color:var(--muted);font-size:1.08rem;padding:1rem 1.4rem;border:1px dashed var(--pb);border-radius:14px;background:rgba(12,22,44,.4)}
.jgoal b{color:#fff;font-weight:600}
@media(max-width:900px){.jsteps{grid-template-columns:1fr 1fr;gap:2rem}.journey .jline{display:none}}

/* ============ SCENE 25: MATURITY CLIMB (ascending staircase) ============ */
.climb{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:1.6rem;align-items:end;height:46vh;margin:2.6rem 0 0;padding-left:2.8rem;z-index:2}
.climb::after{content:"";position:absolute;left:2.8rem;right:0;bottom:-3px;height:2px;background:linear-gradient(90deg,transparent,var(--pb) 18%,var(--pb) 82%,transparent)}
.climb-axis{position:absolute;left:-.1rem;top:0;bottom:6px;display:flex;align-items:center}
.climb-axis span{writing-mode:vertical-rl;transform:rotate(180deg);font-size:.72rem;letter-spacing:.26em;color:var(--sky);font-weight:700;text-transform:uppercase}
.cstep{position:relative;border:1px solid var(--pb);border-radius:18px 18px 0 0;padding:1.5rem;cursor:pointer;text-align:left;color:#fff;font-family:inherit;display:flex;flex-direction:column;gap:.4rem;justify-content:flex-end;overflow:hidden;background:linear-gradient(180deg,rgba(14,26,52,.28),rgba(14,26,52,.82));transform-origin:bottom;opacity:0;transform:translateY(34px) scaleY(.88)}
.climb.play .cstep{animation:crise .75s cubic-bezier(.2,.8,.2,1) forwards;animation-delay:calc(.4s + var(--d)*.5s)}
@keyframes crise{to{opacity:1;transform:none}}
.cstep::before{content:"";position:absolute;left:0;top:0;width:100%;height:5px;background:var(--grad)}
.cstep:nth-child(1){height:62%}.cstep:nth-child(2){height:80%}.cstep:nth-child(3){height:100%}
.cstep.o::before{background:linear-gradient(135deg,var(--orange),var(--ember))}
.cphase{position:absolute;right:1.1rem;top:.7rem;font-family:var(--mono);font-size:2.6rem;font-weight:700;color:rgba(255,255,255,.06);line-height:1}
.cday{font-size:.8rem;letter-spacing:.16em;color:var(--orange2);font-weight:700}
.cpips{display:flex;gap:.34rem;margin:.15rem 0 .2rem}
.cpips i{width:28px;height:5px;border-radius:3px;background:rgba(255,255,255,.13)}
.cpips i.on{background:linear-gradient(90deg,var(--sky),var(--orange))}
.cic{font-size:1.85rem}
.cstep h3{font-size:1.42rem;font-weight:600;margin:.05rem 0}
.cstep p{color:var(--muted);font-size:1rem;line-height:1.35}
.ctap{margin-top:.3rem;font-size:.82rem;color:var(--sky);font-weight:600;opacity:.8;transition:.25s}
.cstep.o .ctap{color:var(--orange2)}
.cstep:hover{border-color:var(--sky);box-shadow:var(--glow);transform:translateY(-7px)}
.cstep.o:hover{border-color:var(--orange);box-shadow:var(--glowO)}
.cstep:hover .ctap{opacity:1}
@media(max-width:1100px){.climb{grid-template-columns:1fr;height:auto;padding-left:1.6rem}.cstep{height:auto!important;border-radius:16px}.climb::after{display:none}.climb-axis span{font-size:.66rem}}

/* ============ SCENE 29: RESILIENCE PILLARS (temple on a foundation) ============ */
.temple{width:100%;margin-top:2rem;z-index:2;display:flex;flex-direction:column}
.temple .cols{display:grid;grid-template-columns:repeat(6,1fr);gap:1rem;align-items:end;height:36vh}
.tcol{position:relative;height:100%;border:1px solid var(--pb);border-top:0;border-radius:0 0 8px 8px;padding:1.4rem 1rem 1.3rem;cursor:pointer;color:#fff;font-family:inherit;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.55rem;background:linear-gradient(180deg,rgba(14,26,52,.82),rgba(8,16,34,.32));transform-origin:bottom;opacity:0;transform:translateY(28px) scaleY(.9)}
.temple.play .tcol{animation:trise .65s cubic-bezier(.2,.8,.2,1) forwards;animation-delay:calc(.5s + var(--d)*.11s)}
@keyframes trise{to{opacity:1;transform:none}}
.tcol::before{content:"";position:absolute;left:0;top:0;width:100%;height:4px;background:var(--grad)}
.tcol.o::before{background:linear-gradient(135deg,var(--orange),var(--ember))}
.tnum{position:absolute;top:.55rem;right:.7rem;font-family:var(--mono);font-size:.78rem;color:var(--muted)}
.tic{font-size:2.05rem;margin-top:.35rem;transition:transform .3s}
.tcol h4{font-size:1.05rem;font-weight:600;line-height:1.16}
.tline{font-size:.82rem;color:var(--muted);line-height:1.3}
.tcol:hover{border-color:var(--sky);box-shadow:var(--glow);transform:translateY(-7px)}
.tcol.o:hover{border-color:var(--orange);box-shadow:var(--glowO)}
.tcol:hover .tic{transform:scale(1.18) translateY(-2px)}
.foundation{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;padding:1.1rem 1rem;border-radius:8px;border:1px solid var(--pb);background:linear-gradient(180deg,rgba(42,164,244,.18),rgba(247,121,31,.13));box-shadow:var(--glow);opacity:0;transform:translateY(16px)}
.temple.play .foundation{animation:jrise .6s ease forwards;animation-delay:.3s}
.f-ic{font-size:1.45rem}
.f-txt{font-weight:700;letter-spacing:.24em;font-size:1.16rem;background:linear-gradient(100deg,var(--sky),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
.f-sub{font-size:.82rem;color:var(--muted);letter-spacing:.08em}
@media(max-width:900px){.temple .cols{grid-template-columns:1fr 1fr 1fr;height:auto;gap:.7rem}.tcol{height:auto}}
@media(max-width:900px){.g3,.g4{grid-template-columns:1fr 1fr}.duo,.gauges{grid-template-columns:1fr}.m-panel{padding:2rem 1.5rem}.two{gap:1.6rem}}
</style>

<script>
/* ===== registry + builders ===== */
const DETAILS={};let _k=0;
function reg(d){const k='k'+(_k++);DETAILS[k]=d;return k}
function card(c){return `<button class="fcard ${c.o?'o':''}" data-k="${reg(c)}"><span class="ic">${c.icon}</span><h3>${c.title}</h3><p>${c.tag||''}</p><span class="explore">Explore <i>→</i></span></button>`}
const HEROMARK='<img class="hero-mark" src="asset/ITSEC%20Icon.png" alt="">';
const CYBERNET='<canvas class="cybernet" aria-hidden="true"></canvas>';
const PARTNERLOGOS='<span class="pchip"><img src="asset/ded-det.png" alt="Dubai Economy and Tourism"></span><span class="pchip"><img src="asset/DC CHAMBER OF COMMERCE.png" alt="DC Chamber of Commerce"></span>';

/* ---- ORBIT scene ---- */
function orbit(coreHTML,items,o){
  const n=items.length, cx=50, cy=50, rx=40, ry=40;
  const pts=items.map((it,i)=>{const a=-Math.PI/2+i*2*Math.PI/n;return {x:cx+Math.cos(a)*rx,y:cy+Math.sin(a)*ry,it}});
  const lines=pts.map(p=>`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" class="flowline ${o?'o':''}" vector-effect="non-scaling-stroke"/>`).join('');
  const nodes=pts.map(p=>`<button class="onode ${o?'o':''}" style="left:${p.x}%;top:${p.y}%" data-k="${reg(p.it)}"><span class="oi">${p.it.icon}</span><h5>${p.it.title}</h5></button>`).join('');
  const fb=items.map(it=>card(it)).join('');
  return `<div class="orbit"><svg class="olines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg><div class="ocore pulse ${o?'o':''}">${coreHTML}</div>${nodes}</div><div class="orbit-fallback grid g2">${fb}</div>`;
}

{nav:'Why Resilience Now',html:`<!-- SPEAKER NOTE (cloud/SaaS compliance): For ordinary private SMEs, the practical priority is to understand cloud/SaaS dependency and recovery options. For companies serving Dubai Government, semi-government, or critical entities, cloud location, CSP compliance, and data residency may become procurement or regulatory requirements. --><!-- SPEAKER NOTE (service examples): Use the member/service examples as illustrations of digital services that may be affected when cloud, SaaS, CRM, payment, or service platforms go down. Do not claim these are confirmed Dubai Chambers systems unless provided officially. --><section class="slide"><div class="idx">02</div>

    <button class="otile" data-k="${reg({icon:'☁️',title:'Cloud / SaaS — Offline',intro:'Most business systems now live on cloud and SaaS platforms.',list:['A region or provider outage stops many systems at once','You depend on infrastructure you do not control']})}"><span class="oi">☁️</span><span class="om"><b>Cloud / SaaS</b><span>Where systems live</span></span><span class="st down"><i></i>DOWN</span></button>
    <button class="otile" data-k="${reg({icon:'💵',title:'Finance / ERP — Degraded',intro:'Invoicing, payroll and payments depend on finance systems.',list:['Cash flow and payroll at risk','Fraud risk rises during disruption']})}"><span class="oi">💵</span><span class="om"><b>Finance / ERP</b><span>Invoicing &amp; payroll</span></span><span class="st warn"><i></i>AT RISK</span></button>
    <button class="otile" data-k="${reg({icon:'🌐',title:'Member Services Portal — Degraded',intro:'Public face and member self-service — e.g. certificate issuance, event registration, member communication, payments.',list:['Member self-service &amp; event registration disrupted','Trust and public confidence impacted'],ex:'Examples only — illustrative of services that may be affected; not a confirmed system inventory.'})}"><span class="oi">🌐</span><span class="om"><b>Member Services Portal</b><span>Self-service &amp; certificates</span></span><span class="st warn"><i></i>AT RISK</span></button>

</section>`},

// 5 CAPABILITY MATRIX
{nav:'Backup vs DR vs Failover',html:`<section class="slide"><div class="idx">05</div>
  <div class="reveal kicker">Maturity Matrix</div>
  <h2 class="reveal">Backup Is <span class="hl">Not Disaster Recovery</span></h2>
  <p class="reveal sub">Each capability is a different level of maturity — and a different promise.</p>
  <table class="rto reveal"><thead><tr><th>Capability</th><th>What it means</th><th>What it does NOT mean</th></tr></thead><tbody>
    <tr><td>💾 Backup</td><td>A copy of data stored separately</td><td><span class="pill">Does not guarantee fast recovery</span></td></tr>
    <tr><td>🔄 Disaster Recovery</td><td>Structured restoration of systems after disruption</td><td><span class="pill">Not always automatic failover</span></td></tr>
    <tr><td>🖥️ Standby Server</td><td>Secondary server ready to be activated</td><td><span class="pill">May need manual config &amp; data sync</span></td></tr>
    <tr><td>♾️ High Availability</td><td>Architecture designed to reduce downtime</td><td><span class="pill">Does not replace backup or ransomware recovery</span></td></tr>
    <tr><td>⚡ Failover</td><td>Switching to another environment</td><td><span class="pill">Fails if it is never tested</span></td></tr>
    <tr><td>🏢 Business Continuity</td><td>Keeping operations running for customers</td><td><span class="pill b">Includes people, process &amp; comms</span></td></tr>
  </tbody></table>
</section>`},

// 6 DATA CLASSIFICATION — pyramid
{nav:'Data Classification',html:`<!-- SPEAKER NOTE (data classification): This is not only a compliance point. Even for private SMEs, data classification is the foundation of practical DR. You cannot define RTO/RPO if you do not know which data matters most. --><section class="slide"><div class="idx">06</div>
  <div class="reveal kicker">Classification Comes First</div>
  <h2 class="reveal">Not All Data Has the Same <span class="hl">Recovery Priority</span></h2>
  <p class="reveal sub">Before RTO and RPO, classify your data — or you will overspend on the trivial and underprotect the critical. Click each tier.</p>
  <div class="pyramid reveal">
    <button class="ptier crit" data-k="${reg({icon:'🔴',title:'Mission-Critical',intro:'Systems where downtime stops the business immediately.',list:['Payment & trading systems, ERP, CRM, customer database','Recovery: immediate / near-real-time']})}"><b>Mission-Critical</b><span>Payments · ERP · CRM</span></button>
    <button class="ptier" data-k="${reg({icon:'🟠',title:'Operational-Critical',intro:'Systems the business needs back within defined hours.',list:['Email, accounting, HR, supplier systems','Recovery: fast, within defined hours']})}"><b>Operational-Critical</b><span>Email · Accounting · HR</span></button>
    <button class="ptier" data-k="${reg({icon:'🟡',title:'Business-Supporting',intro:'Useful systems with a tolerable recovery window.',list:['Marketing files, internal reports, non-critical SaaS','Recovery: 24–48 hours']})}"><b>Business-Supporting</b><span>Marketing · Reports</span></button>
    <button class="ptier" data-k="${reg({icon:'⚪',title:'Archived / Historical',intro:'Low immediate operational impact.',list:['Old records, inactive client files, legacy documents','Recovery: longer window acceptable']})}"><b>Archived / Historical</b><span>Legacy &amp; inactive records</span></button>
  </div>
  <button class="preg reveal" data-k="${reg({icon:'⚖️',title:'Regulated / Sensitive Data',intro:'Cuts across every tier — and adds legal weight.',list:['KYC data, financial records, contracts, personal data','Must consider privacy, retention & access control','Recovery decisions are also compliance decisions']})}"><span class="pi">⚖️</span><span><b>Regulated / Sensitive data</b> — KYC, financials, contracts, personal data — cuts across all tiers: privacy, retention &amp; access control apply.</span></button>
  <div class="callout reveal classfirst" style="border-left-color:var(--sky);max-width:none"><b style="color:var(--sky)">Dubai Data Classification Comes Before Recovery Planning</b>Before defining RTO and RPO, classify data by sensitivity, ownership, location, service dependency, legal obligation and recovery priority. For Dubai Government and in-scope entities, classification and protection should align with ISR / Dubai Data requirements where applicable.</div>
  <table class="rto reveal classlens"><thead><tr><th>Classification lens</th><th>Question</th></tr></thead><tbody>
    <tr><td>Sensitivity</td><td>Is the data public, internal, confidential, sensitive, regulated, or critical?</td></tr>
    <tr><td>Location</td><td>Where is it stored, processed, backed up, or replicated?</td></tr>
    <tr><td>Service dependency</td><td>Which customer, member, public, or internal service depends on it?</td></tr>
    <tr><td>Recovery priority</td><td>How fast must it be restored?</td></tr>
    <tr><td>Access control</td><td>Who can access, export, delete, or restore it?</td></tr>
  </tbody></table>
</section>`},

// 7 WHEN DESC / ISR / CSP BECOMES RELEVANT (conditional compliance layer)
{nav:'When DESC / ISR / CSP Applies',html:`<!-- SPEAKER NOTE (purpose): For a normal private SME, DESC is not the starting point — business resilience is. But if the company wants to sell to government, semi-government, or critical sectors, resilience also becomes part of compliance and procurement readiness. --><!-- SPEAKER POSITIONING (Amir): "For most SMEs, the immediate priority is not regulatory complexity. It is knowing your data, defining recovery priorities, securing backups, and proving you can restore operations. But if your business serves government, semi-government, or critical entities, then resilience also becomes part of procurement readiness and regulatory alignment." --><section class="slide"><div class="idx">07</div>
  <div class="reveal kicker">Conditional Compliance Layer</div>
  <h2 class="reveal">When DESC / ISR / CSP Requirements <span class="hl">Become Relevant</span></h2>
  <p class="reveal sub" style="max-width:84ch">Not every SME is directly subject to DESC requirements. They may become relevant when a private company operates in — or supplies services into — Dubai's government, semi-government or critical digital ecosystem.</p>
  <table class="rto reveal desctable"><thead><tr><th>Business type</th><th>Practical SME requirement</th><th>DESC / government-aligned requirement</th></tr></thead><tbody>
    <tr><td>Normal private SME</td><td>Backup, DR, RTO/RPO, ransomware recovery, business continuity</td><td><span class="pill b">DESC may not directly apply unless otherwise regulated or classified</span></td></tr>
    <tr><td>SME handling sensitive customer data</td><td>Strong data protection, access control, backup security, incident response</td><td><span class="pill">Use DESC-style controls as benchmark; confirm legal obligations</span></td></tr>
    <tr><td>SME selling technology to government</td><td>Secure architecture, UAE data location, DR evidence, incident response</td><td><span class="pill">ISR / DESC may become part of procurement or contract</span></td></tr>
    <tr><td>Cloud / infrastructure provider</td><td>Secure hosting, DR, SLA, data protection</td><td><span class="pill">DESC CSP certification may be required where applicable</span></td></tr>
    <tr><td>SOC / MSSP provider</td><td>Monitoring, incident response, ISO 27001, ISO 22301</td><td><span class="pill">DESC SOC / Cyber Force / CSP may apply if serving gov, semi-gov or CII</span></td></tr>
    <tr><td>AI / SaaS provider</td><td>Secure development, data handling, logging, monitoring, recovery</td><td><span class="pill">DESC AI Security Policy / data residency / ISR may apply when serving gov, semi-gov or CII</span></td></tr>
  </tbody></table>
</section>`},

// 8 RTO/RPO TIMELINE
{nav:'RTO & RPO',html:`<section class="slide"><div class="idx">08</div>
  <div class="reveal kicker">Recovery Objectives</div>
  <h2 class="reveal">RTO and RPO Are <span class="hl">Business Decisions</span></h2>
  <div class="two reveal">
    <div class="diagbox"><svg viewBox="0 0 460 300">
      <line x1="30" y1="210" x2="430" y2="210" stroke="rgba(42,164,244,.35)" stroke-width="2"/>
      <path d="M250 210 Q340 210 425 70" fill="none" stroke="#ff7a7a" stroke-width="2" stroke-dasharray="5 5"/>
      <text x="430" y="60" text-anchor="end" fill="#ff9a9a" font-size="11" font-family="Space Grotesk">business impact ↑</text>
      <rect x="120" y="200" width="130" height="20" fill="rgba(247,121,31,.22)"/>
      <rect x="250" y="200" width="120" height="20" fill="rgba(42,164,244,.22)"/>
      <line x1="120" y1="180" x2="120" y2="240" stroke="#93a6c8" stroke-width="1.5" stroke-dasharray="3 3"/><text x="120" y="262" text-anchor="middle" fill="#93a6c8" font-size="10" font-family="Space Grotesk">last backup</text>
      <line x1="250" y1="160" x2="250" y2="240" stroke="#ff5050" stroke-width="2"/><text x="250" y="150" text-anchor="middle" font-size="18">💥</text><text x="250" y="262" text-anchor="middle" fill="#ff9a9a" font-size="10" font-family="Space Grotesk">incident</text>
      <line x1="370" y1="180" x2="370" y2="240" stroke="#2aa4f4" stroke-width="1.5" stroke-dasharray="3 3"/><text x="370" y="262" text-anchor="middle" fill="#9be8ab" font-size="10" font-family="Space Grotesk">recovered</text>
      <text x="185" y="195" text-anchor="middle" fill="#ff9d6b" font-size="12" font-weight="700" font-family="Space Grotesk">RPO</text>
      <text x="310" y="195" text-anchor="middle" fill="#7fc4ff" font-size="12" font-weight="700" font-family="Space Grotesk">RTO</text>
      <text x="185" y="288" text-anchor="middle" fill="#93a6c8" font-size="9.5" font-family="Space Grotesk">data you can lose</text>
      <text x="310" y="288" text-anchor="middle" fill="#93a6c8" font-size="9.5" font-family="Space Grotesk">time to restore</text>
    </svg></div>
    <div>
    <div class="grid g2" style="margin-top:0;gap:1rem">
      ${card({icon:'⏱️',title:'RTO',tag:'Recovery Time Objective',intro:'How quickly must the system be restored?',list:['Drives replication, failover & budget','Measured in minutes to days']})}
      ${card({o:1,icon:'💾',title:'RPO',tag:'Recovery Point Objective',intro:'How much data can the business afford to lose?',list:['Drives backup frequency & replication','Near-zero for payments']})}
    </div>
    <div class="callout"><b>It is a leadership decision</b>If the CEO says the business cannot be down more than one hour, the architecture, budget, replication and failover must support that one-hour target.</div>
    </div>
  </div>
</section>`},

// 8 BUSINESS IMPACT MATRIX
{nav:'Business & Service Impact',html:`<!-- SPEAKER NOTE (business & service impact): RTO/RPO must reflect both business impact and service impact. For SMEs, service impact means customer experience, revenue continuity, contractual delivery, reputation, and operational trust. --><section class="slide"><div class="idx">09</div>
  <div class="reveal kicker">Impact-Based Recovery</div>
  <h2 class="reveal">RTO / RPO Must Be Based on <span class="hl">Business and Service Impact</span></h2>
  <p class="reveal sub">Treat every system equally and DR becomes expensive and ineffective. Prioritise.</p>
  <table class="rto reveal"><thead><tr><th>System</th><th>Business impact</th><th>Suggested RTO</th><th>Suggested RPO</th></tr></thead><tbody>
    <tr><td>Payment / transaction</td><td>Revenue stops immediately</td><td><span class="pill">15–30 min</span></td><td><span class="pill b">Near zero</span></td></tr>
    <tr><td>CRM / customer DB</td><td>Sales &amp; service disruption</td><td><span class="pill">1–4 hours</span></td><td><span class="pill b">15–60 min</span></td></tr>
    <tr><td>Email</td><td>Communication disruption</td><td><span class="pill">2–4 hours</span></td><td><span class="pill b">1 hour</span></td></tr>
    <tr><td>Accounting</td><td>Finance disruption</td><td><span class="pill">4–8 hours</span></td><td><span class="pill b">4 hours</span></td></tr>
    <tr><td>Website</td><td>Trust &amp; lead-gen impact</td><td><span class="pill">2–6 hours</span></td><td><span class="pill b">24 hours</span></td></tr>
    <tr><td>Archive data</td><td>Low immediate impact</td><td><span class="pill">24–72 hours</span></td><td><span class="pill b">24 hours</span></td></tr>
  </tbody></table>
  <div class="callout reveal" style="border-left-color:var(--sky);max-width:none"><b style="color:var(--sky)">Service impact, not only financial</b>For Dubai Chambers and service-oriented organizations, impact is not only financial — a disruption may affect member services, certificate issuance, stakeholder communication, event registration, payment processing, service delivery and public trust.</div>
</section>`},

// 9 RESILIENCE STACK — 9 layers
{nav:'Resilience Stack',html:`<section class="slide"><div class="idx">10</div>
  <div class="reveal kicker">The Business Resilience Stack</div>
  <h2 class="reveal">Resilience Is Built in <span class="hl">Layers</span></h2>
  <p class="reveal sub">Most SMEs start at backup and stop. Maturity means climbing the full stack. Click any layer.</p>
  <div class="stack s9 cascade">
    ${[['🗃️','Data Inventory','Know what data and systems you actually have.'],
       ['🏷️','Data Classification','Rank by criticality and sensitivity.'],
       ['💾','Backup','Clean, complete, restorable copies.'],
       ['🔁','Replication','Keep a synchronised copy elsewhere.'],
       ['🖥️','Standby Infrastructure','A secondary environment ready to run.'],
       ['⚡','Failover','Switch operations to standby — tested.'],
       ['🔄','Disaster Recovery Plan','Defined order, owners and recovery times.'],
       ['🏢','Business Continuity Plan','People, process and manual workarounds.'],
       ['🧪','Testing &amp; Tabletop','Prove it works before the crisis.']
      ].map((l,i)=>`<button class="slayer ${i%2?'o':''}" data-k="${reg({icon:l[0],title:l[1].replace('&amp;','&'),intro:l[2]})}"><span class="ln">${i+1}</span><span class="si">${l[0]}</span><div><h3>${l[1]}</h3></div><span class="arrow">${i===8?'✓':'↑'}</span></button>`).join('')}
  </div>
</section>`},

// 10 BACKUP MODELS — 6 cards
{nav:'Backup Models',html:`<section class="slide"><div class="idx">11</div>
  <div class="reveal kicker">Backup Models</div>
  <h2 class="reveal">Not All Backups <span class="hl">Protect Equally</span></h2>
  <p class="reveal sub">The right question is not "do we have backups?" — it is "can we restore clean, usable data in time?" Click each model.</p>
  <div class="grid g3 cascade">
    ${card({icon:'🏠',title:'Local Backup',tag:'Fast restore',intro:'Stored on-site for quick recovery.',list:['Fast to restore','Vulnerable to site failure or ransomware if not isolated']})}
    ${card({o:1,icon:'☁️',title:'Cloud Backup',tag:'Flexible & scalable',intro:'Stored with a cloud provider.',list:['Scalable and off-site','Must be secured and tested']})}
    ${card({icon:'🔌',title:'Offline Backup',tag:'Air-gapped',intro:'Disconnected copy for ransomware protection.',list:['Strong ransomware protection','Slower to recover']})}
    ${card({o:1,icon:'🔒',title:'Immutable Backup',tag:'Cannot be altered',intro:'Locked for a retention period.',list:['Cannot be modified or deleted','Defeats backup-deletion attacks']})}
    ${card({icon:'📸',title:'Snapshot',tag:'Point-in-time',intro:'A fast point-in-time image.',list:['Quick recovery point','Not a complete backup strategy alone']})}
    ${card({o:1,icon:'♾️',title:'Continuous Backup',tag:'Near-zero RPO',intro:'Constantly captures changes.',list:['Minimises data loss','Needs stronger design and budget']})}
  </div>
</section>`},

// 11 STANDBY & FAILOVER — spectrum
{nav:'Standby & Failover',html:`<section class="slide"><div class="idx">12</div>
  <div class="reveal kicker">Levels of Readiness</div>
  <h2 class="reveal">Standby and Failover Are <span class="hl">Different Levels of Readiness</span></h2>
  <div class="specbar reveal"><span>◂ lower cost · slower recovery</span><span class="sb-r">higher cost · faster recovery ▸</span></div>
  <div class="spectrum reveal">
    <button class="spcard" data-k="${reg({icon:'🧊',title:'Cold Standby',intro:'Infrastructure exists but must be configured and restored.',list:['Recovery: slow','Cost: lower']})}"><span class="spi">🧊</span><h3>Cold Standby</h3><p>Infrastructure exists but must be configured/restored.</p><div class="sptags"><span class="sptag">Slow</span><span class="sptag">Low cost</span></div></button>
    <button class="spcard" data-k="${reg({icon:'🌤️',title:'Warm Standby',intro:'Secondary environment partly ready and periodically synced.',list:['Recovery: medium','Cost: medium']})}"><span class="spi">🌤️</span><h3>Warm Standby</h3><p>Partly ready, periodically synced.</p><div class="sptags"><span class="sptag">Medium</span><span class="sptag">Medium cost</span></div></button>
    <button class="spcard" data-k="${reg({icon:'🔥',title:'Hot Standby',intro:'Secondary environment running and near real-time synced.',list:['Recovery: fast','Cost: higher']})}"><span class="spi">🔥</span><h3>Hot Standby</h3><p>Running and near real-time synced.</p><div class="sptags"><span class="sptag">Fast</span><span class="sptag">Higher cost</span></div></button>
    <button class="spcard o" data-k="${reg({icon:'🔀',title:'Active-Passive Failover',intro:'Primary runs; secondary activates during failure.',list:['Recovery: fast if tested','Cost: medium / high']})}"><span class="spi">🔀</span><h3>Active-Passive</h3><p>Secondary activates on failure.</p><div class="sptags"><span class="sptag o">Fast*</span><span class="sptag o">Med/High</span></div></button>
    <button class="spcard o" data-k="${reg({icon:'⚖️',title:'Active-Active Failover',intro:'Multiple environments run simultaneously.',list:['Recovery: very fast','Cost: highest'],ex:'The more aggressive the RTO/RPO, the more you invest in replication, automation and testing.'})}"><span class="spi">⚖️</span><h3>Active-Active</h3><p>Multiple environments run at once.</p><div class="sptags"><span class="sptag o">Very fast</span><span class="sptag o">Highest</span></div></button>
  </div>
</section>`},

// 12 WHY FAILOVER FAILS
{nav:'Why Failover Fails',html:`<section class="slide"><div class="idx">13</div>
  <div class="reveal kicker">The Failover Trap</div>
  <h2 class="reveal">Failover Often Fails Because It Was <span class="hl">Never Tested</span></h2>
  <div class="two reveal">
    <div class="diagbox"><svg viewBox="0 0 380 300">
      <rect x="24" y="110" width="120" height="80" rx="14" fill="rgba(13,27,58,.92)" stroke="rgba(39,201,63,.5)" stroke-width="2"/>
      <text x="84" y="146" text-anchor="middle" font-size="26">🖥️</text><text x="84" y="172" text-anchor="middle" fill="#9be8ab" font-size="10" font-family="Space Grotesk">Primary</text>
      <rect x="236" y="110" width="120" height="80" rx="14" fill="rgba(40,14,14,.7)" stroke="#ff5050" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="296" y="146" text-anchor="middle" font-size="26">🖥️</text><text x="296" y="172" text-anchor="middle" fill="#ff9a9a" font-size="10" font-family="Space Grotesk">Secondary (untested)</text>
      <line x1="144" y1="150" x2="236" y2="150" stroke="#ff5050" stroke-width="2.5" stroke-dasharray="7 6"/>
      ${[[166,'DNS'],[190,'IAM'],[214,'SYNC']].map(p=>`<g><circle class="blink" cx="${p[0]}" cy="150" r="11" fill="rgba(255,80,80,.2)" stroke="#ff5050" stroke-width="2"/><text x="${p[0]}" y="153" text-anchor="middle" font-size="8" fill="#ff9a9a" font-family="Space Grotesk">✕</text><text x="${p[0]}" y="128" text-anchor="middle" font-size="8" fill="#ff9a9a" font-family="Space Grotesk">${p[1]}</text></g>`).join('')}
      <text x="190" y="210" text-anchor="middle" fill="#ff9a9a" font-size="11" font-weight="700" font-family="Space Grotesk">switch breaks here</text>
    </svg></div>
    <div><p class="lead">Failover is not a diagram. It is an <span class="note">operational procedure</span> that must be rehearsed.</p>
    <ul class="points">
      <li>DNS not ready · identity provider unavailable</li>
      <li>Data not synchronised · firewall rules not mirrored</li>
      <li>Application dependencies missing · certificates expired</li>
      <li>Backups not compatible · staff did not know the process</li>
      <li>No failback plan to return to normal</li>
    </ul></div>
  </div>
</section>`},

// 13 DATA REPLICATION, MIRRORING & RESIDENCY
{nav:'Replication & Residency',html:`<!-- SPEAKER NOTE (replication & residency): Do not say offshore mirroring is always acceptable. Do not say it is always prohibited for every private company. Say it depends on the data, client, contract, sector, and whether the organization is in scope of UAE / DESC / government requirements. --><section class="slide"><div class="idx">14</div>
  <div class="reveal kicker">Replication, Mirroring &amp; Residency</div>
  <h2 class="reveal">Data Replication, Mirroring &amp; <span class="hl">Residency</span> Considerations</h2>
  <div class="two reveal">
    <div class="diagbox"><svg viewBox="0 0 380 300">
      <rect x="22" y="100" width="130" height="100" rx="14" fill="rgba(13,27,58,.92)" stroke="#2aa4f4" stroke-width="2"/>
      <text x="87" y="140" text-anchor="middle" font-size="28">🇦🇪</text><text x="87" y="172" text-anchor="middle" fill="#cfe6ff" font-size="10" font-family="Space Grotesk">UAE data centre</text>
      <rect x="228" y="100" width="130" height="100" rx="14" fill="rgba(13,27,58,.92)" stroke="rgba(247,121,31,.5)" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="293" y="140" text-anchor="middle" font-size="28">🌍</text><text x="293" y="172" text-anchor="middle" fill="#ff9d6b" font-size="10" font-family="Space Grotesk">Offshore mirror</text>
      <line x1="152" y1="150" x2="228" y2="150" class="flowline o" vector-effect="non-scaling-stroke" stroke-width="2.5"/>
      <text x="190" y="132" text-anchor="middle" font-size="18">🔒</text><text x="190" y="170" text-anchor="middle" fill="#93a6c8" font-size="8.5" font-family="Space Grotesk">encrypted · keyed</text>
      <line x1="190" y1="40" x2="190" y2="250" stroke="rgba(247,121,31,.3)" stroke-width="1.5" stroke-dasharray="4 5"/>
      <text x="190" y="34" text-anchor="middle" fill="#ff9d6b" font-size="9" font-family="Space Grotesk">jurisdiction boundary</text>
    </svg></div>
    <div><p class="lead">Replication and mirroring improve resilience — but data location is a <span class="note">governance decision</span>, not just a technical one.</p>
    <ul class="points">
      <li><b>For private SMEs:</b> base replication on business needs, customer contracts, privacy obligations, encryption, restore speed &amp; risk appetite</li>
      <li><b>For government, semi-government, Critical Non-Government entities &amp; providers serving them:</b> UAE data residency &amp; DESC-aligned requirements may restrict storing, backing up or using classified/sensitive data outside the UAE</li>
      <li>Where is the data physically stored, and who controls the encryption keys?</li>
      <li>Does the client contract allow cross-border storage — and is failback to the UAE tested?</li>
    </ul>
    <div class="callout"><b>Key message</b>Mirroring is a resilience tool, but data location must be governed.</div>
    </div>
  </div>
</section>`},

// 14 MULTI-CLOUD FAILOVER
{nav:'Multi-Cloud Failover',html:`<!-- SPEAKER NOTE (cloud compliance): DESC's SOC Security Policy states that cloud-based managed SOCs require adherence to DESC CSP Security Policy certification, and third-party cloud infrastructure must also be certified according to DESC CSP Security Policy where applicable. ISR V3 references include legal/geographical UAE boundaries, incident reporting, and separate DR site requirements. --><section class="slide"><div class="idx">15</div>
  <div class="reveal kicker">Multi-Cloud Continuity</div>
  <h2 class="reveal">Multi-Cloud Is Not Resilience <span class="hl">Unless It Is Tested</span></h2>
  <div class="two reveal">
    <div class="diagbox"><svg viewBox="0 0 380 300">
      <rect x="22" y="105" width="120" height="90" rx="14" fill="rgba(13,27,58,.92)" stroke="#2aa4f4" stroke-width="2"/>
      <text x="82" y="145" text-anchor="middle" font-size="26">☁️</text><text x="82" y="174" text-anchor="middle" fill="#cfe6ff" font-size="10" font-family="Space Grotesk">Primary cloud</text>
      <rect x="238" y="105" width="120" height="90" rx="14" fill="rgba(13,27,58,.92)" stroke="rgba(39,201,63,.5)" stroke-width="2"/>
      <text x="298" y="145" text-anchor="middle" font-size="26">☁️</text><text x="298" y="174" text-anchor="middle" fill="#9be8ab" font-size="10" font-family="Space Grotesk">Secondary cloud</text>
      <line x1="142" y1="150" x2="238" y2="150" class="flowline" vector-effect="non-scaling-stroke" stroke-width="2.5"/>

{nav:'Threat Actors',html:`<!-- SPEAKER NOTE (threat actors target DATA): Attackers do not only target systems. They target data confidentiality, data integrity, and data availability. A DR plan must protect production data and backup data. --><section class="slide"><div class="idx">18</div>

    </div>
    <div class="hexcol">

      <button class="hex o" data-k="${reg({icon:'💥',title:'Cyber Terrorists',intro:'Aim to cause fear and disrupt critical infrastructure.',list:['Maximise disruption & visibility']})}"><div class="face"><span class="ic">💥</span><h4>Terrorists</h4><small>Disruption</small></div></button>
    </div>
    <div class="hexcol">
      <button class="hex o" data-k="${reg({icon:'📢',title:'Hacktivists',intro:'Driven by political or social causes.',list:['Data leaks & defacement','Campaign-style disruption']})}"><div class="face"><span class="ic">📢</span><h4>Hacktivists</h4><small>Ideology</small></div></button>

/* ===== render + nav ===== */
const stage=document.getElementById('stage'),dotsEl=document.getElementById('dots'),ovgrid=document.getElementById('ovgrid');
stage.innerHTML=slides.map(s=>s.html).join('');
const slideEls=[...document.querySelectorAll('.slide')];let idx=0;
document.getElementById('total').textContent=String(slides.length).padStart(2,'0');
slides.forEach((s,i)=>{const d=document.createElement('button');d.title=(i+1)+'. '+s.nav;d.onclick=()=>go(i);dotsEl.appendChild(d);
  const o=document.createElement('button');o.innerHTML=`<span class="qn">${String(i+1).padStart(2,'0')}</span>${s.nav}`;o.onclick=()=>{go(i);overview.classList.remove('show');document.getElementById('burger').classList.remove('open')};ovgrid.appendChild(o);});
const dotBtns=[...dotsEl.children];
function animateSlide(el){
  el.querySelectorAll('[data-count]').forEach(n=>{const target=+n.dataset.count,suf=n.dataset.suffix||'';let t0=null;
    requestAnimationFrame(function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/1400,1),e=1-Math.pow(1-p,3);n.textContent=Math.floor(e*target).toLocaleString()+suf;if(p<1)requestAnimationFrame(step)})});
  el.querySelectorAll('[data-anim]').forEach(r=>{r.classList.remove('play');void r.offsetWidth;r.classList.add('play')});
  el.querySelectorAll('.cybernet').forEach(c=>c._resize&&c._resize());
  runGauges(el);runClock(el);
}
/* RTO / RPO semicircle gauges — arc wipes in, marker rides the arc, value reveals */
function runGauges(el){el.querySelectorAll('.ggauge').forEach(svg=>{
  const frac=parseFloat(svg.dataset.frac)||0,arc=svg.querySelector('.g-arc'),dot=svg.querySelector('.g-dot'),val=svg.querySelector('.g-val');
  const target=svg.dataset.target?+svg.dataset.target:null,unit=svg.dataset.unit||'';
  const dur=1500,cx=60,cy=60,r=46;let t0=null;
  if(arc)arc.style.strokeDashoffset=100;if(target!=null&&val)val.textContent='0'+(unit?' '+unit:'');
  requestAnimationFrame(function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3),f=frac*e;
    if(arc)arc.style.strokeDashoffset=100-f*100;
    if(dot){const th=Math.PI*(1-f);dot.setAttribute('cx',cx+r*Math.cos(th));dot.setAttribute('cy',cy-r*Math.sin(th));}
    if(target!=null&&val)val.textContent=Math.round(e*target)+(unit?' '+unit:'');
    if(p<1)requestAnimationFrame(step);});
});}
/* 60-minute clock — ring fills, hand sweeps a full turn, number counts 0→60 */
function runClock(el){const svg=el.querySelector('.clock60');if(!svg)return;
  const arc=svg.querySelector('.c-arc'),needle=svg.querySelector('.c-needle'),num=svg.querySelector('.c-num');
  const dur=2200;let t0=null;if(arc)arc.style.strokeDashoffset=100;if(num)num.textContent='0';
  requestAnimationFrame(function step(ts){if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1),e=1-Math.pow(1-p,3);
    if(arc)arc.style.strokeDashoffset=100-e*100;
    if(needle)needle.setAttribute('transform','rotate('+(e*360)+' 150 150)');
    if(num)num.textContent=Math.round(e*60);
    if(p<1)requestAnimationFrame(step);});
}
function go(n){n=Math.max(0,Math.min(slides.length-1,n));if(n===idx)return;
  const cur=slideEls[idx];cur.classList.add('leaving');cur.classList.remove('active');setTimeout(()=>cur.classList.remove('leaving'),560);
  idx=n;const s=slideEls[idx];s.classList.add('active');if(idx>0&&window.ptAutoStart)window.ptAutoStart();if(window.ptSlideReset)window.ptSlideReset();update();animateSlide(s);}
function update(){dotBtns.forEach((b,i)=>b.classList.toggle('on',i===idx));document.getElementById('cur').textContent=String(idx+1).padStart(2,'0');
  document.getElementById('prog').style.width=(idx/(slides.length-1)*100)+'%';document.getElementById('navTitle').textContent=slides[idx].nav;dotBtns[idx].scrollIntoView({block:'nearest'});if(window.ptRender)window.ptRender();}
function next(){go(idx+1)}function prev(){go(idx-1)}
slideEls[0].classList.add('active');update();animateSlide(slideEls[0]);
document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;
document.getElementById('brandHome').onclick=()=>go(0);

/* ===== speaker presentation timer (45 min budget across the deck) ===== */
(function(){
  const TALK_MIN=45;
  const total=TALK_MIN*60;
  const perSlide=total/slides.length;            // ≈100s (1:40) per slide across 27 slides
  let slideElapsed=0,running=false,started=false,last=0,raf=0;
  const sEl=document.getElementById('stimer'),slTimeEl=document.getElementById('slTime');
  function fmt(s){const neg=s<0;s=Math.abs(Math.round(s));return (neg?'-':'')+Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  function render(){
    const sLeft=perSlide-slideElapsed;           // per-slide countdown, resets on every slide
    slTimeEl.textContent=fmt(sLeft);
    sEl.classList.toggle('warn',sLeft<=15&&sLeft>0);
    sEl.classList.toggle('over',sLeft<=0);
  }
  function tick(ts){if(!running)return;if(!last)last=ts;slideElapsed+=(ts-last)/1000;last=ts;render();raf=requestAnimationFrame(tick);}
  function start(){if(running)return;running=true;started=true;last=0;raf=requestAnimationFrame(tick);}
  function pause(){running=false;cancelAnimationFrame(raf);}
  window.ptAutoStart=()=>{if(!started&&!running)start();};
  window.ptRender=render;
  window.ptSlideReset=()=>{slideElapsed=0;render();};
  window.ptToggle=()=>running?pause():start();
  window.ptHide=()=>sEl.classList.toggle('hide');
  render();
})();

/* ===== cybersecurity connected-node network (cover + end slide) ===== */
(function(){
  const mouse={x:null,y:null};
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
  window.addEventListener('mouseout',()=>{mouse.x=mouse.y=null});
  [...document.querySelectorAll('.cybernet')].forEach(cv=>{
    const ctx=cv.getContext('2d');let w=0,h=0,dpr=1,nodes=[],linkDist=160;
    function size(){
      const r=cv.getBoundingClientRect();if(!r.width||!r.height)return;
      dpr=Math.min(window.devicePixelRatio||1,2);w=r.width;h=r.height;
      cv.width=w*dpr;cv.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      linkDist=Math.min(185,Math.max(120,w/9));
      const count=Math.round(Math.min(120,Math.max(48,w*h/13000)));
      nodes=Array.from({length:count},()=>({
        x:Math.random()*w,y:Math.random()*h,
        vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
        rad:Math.random()*1.7+1.1,o:Math.random()<.18}));
    }
    cv._resize=size;
    function frame(){
      requestAnimationFrame(frame);
      if(!w||!h){size();return;}
      ctx.clearRect(0,0,w,h);
      for(const n of nodes){n.x+=n.vx;n.y+=n.vy;
        if(n.x<0||n.x>w)n.vx*=-1;if(n.y<0||n.y>h)n.vy*=-1;}
      const r=cv.getBoundingClientRect();
      const mx=mouse.x!=null?mouse.x-r.left:null,my=mouse.y!=null?mouse.y-r.top:null;
      for(let i=0;i<nodes.length;i++){const a=nodes[i];
        for(let j=i+1;j<nodes.length;j++){const b=nodes[j];
          const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
          if(d<linkDist){ctx.strokeStyle='rgba(42,164,244,'+(1-d/linkDist)*.45+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
        if(mx!=null){const dx=a.x-mx,dy=a.y-my,d=Math.hypot(dx,dy),md=180;
          if(d<md){ctx.strokeStyle='rgba(247,121,31,'+(1-d/md)*.6+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(mx,my);ctx.stroke();}}}
      for(const n of nodes){ctx.beginPath();ctx.arc(n.x,n.y,n.rad,0,Math.PI*2);
        ctx.shadowColor=n.o?'rgba(247,121,31,.8)':'rgba(42,164,244,.8)';ctx.shadowBlur=8;
        ctx.fillStyle=n.o?'rgba(247,121,31,.95)':'rgba(130,205,255,.9)';ctx.fill();ctx.shadowBlur=0;}
    }
    size();frame();
  });
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);
    rt=setTimeout(()=>document.querySelectorAll('.cybernet').forEach(c=>c._resize&&c._resize()),200);});
})();

/* ===== modal ===== */
const modal=document.getElementById('modal'),mbody=document.getElementById('mbody'),mpanel=modal.querySelector('.m-panel');
function openModal(d,orange){mpanel.classList.toggle('o',!!orange);
  mbody.innerHTML=`<div class="m-head"><span class="m-ic">${d.icon||'🔹'}</span><h2>${d.title||''}</h2></div>
    ${d.intro?`<p class="m-intro">${d.intro}</p>`:''}
    ${d.list&&d.list.length?`<div class="m-sec"><h4>Key points</h4><ul class="m-list">${d.list.map(li=>`<li>${li}</li>`).join('')}</ul></div>`:''}
    ${d.ex?`<div class="m-ex"><b>In practice</b>${d.ex}</div>`:''}`;
  modal.classList.add('show');}
function closeModal(){modal.classList.remove('show')}
modal.querySelector('.m-close').onclick=closeModal;modal.querySelector('.m-back').onclick=closeModal;
/* cloud risks⇄controls toggle (no modal) */
stage.addEventListener('click',e=>{const tg=e.target.closest('.cloud-toggle');if(tg){tg.closest('.cloudscene').classList.toggle('secure')}});
stage.addEventListener('click',e=>{const t=e.target.closest('[data-k]');if(!t)return;const d=DETAILS[t.getAttribute('data-k')];if(!d)return;
  const orange=t.classList.contains('o')||t.classList.contains('alt')||t.classList.contains('danger');
  /* CTO checklist progress */
  const chk=t.closest('.check');if(chk&&!chk.classList.contains('done')){chk.classList.add('done');
    const grid=chk.closest('.checkgrid'),total=grid.querySelectorAll('.check').length,done=grid.querySelectorAll('.check.done').length;
    const head=grid.previousElementSibling;head.querySelector('.pbar span').style.width=(done/total*100)+'%';head.querySelector('.ptext').textContent=done+' / '+total+' reviewed';}
  /* generic meter (human firewall) */
  const mi=t.closest('.meteritem');if(mi&&!mi.classList.contains('done')){mi.classList.add('done');
    const sc=mi.closest('.meterscene'),all=sc.querySelectorAll('.meteritem').length,done=sc.querySelectorAll('.meteritem.done').length,pct=Math.round(done/all*100);
    sc.style.setProperty('--p',done/all);const f=sc.querySelector('.meterfill');if(f)f.style.width=pct+'%';
    const p=sc.querySelector('.fwpct');if(p)p.textContent=pct+'%';const tt=sc.querySelector('.metertext');if(tt)tt.textContent=done+' / '+all+' topics trained';
    sc.classList.toggle('full',done===all);}
  openModal(d,orange);});
/* card glow + tilt */
stage.addEventListener('mousemove',e=>{const c=e.target.closest('.fcard');if(!c)return;const r=c.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
  c.style.setProperty('--mx',x+'px');c.style.setProperty('--my',y+'px');c.style.transform=`translateY(-7px) perspective(800px) rotateX(${((y/r.height)-.5)*-5}deg) rotateY(${((x/r.width)-.5)*5}deg)`;});

/* ===== keys / swipe / wheel ===== */
const overview=document.getElementById('overview');
const burger=document.getElementById('burger');
function syncBurger(){burger.classList.toggle('open',overview.classList.contains('show'))}
burger.addEventListener('click',()=>{overview.classList.toggle('show');syncBurger()});
window.addEventListener('keydown',e=>{if(modal.classList.contains('show')&&e.key==='Escape'){closeModal();return}
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();next()}else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev()}
  else if(e.key==='Home'){go(0)}else if(e.key==='End'){go(slides.length-1)}else if(e.key.toLowerCase()==='o'){overview.classList.toggle('show');syncBurger()}
  else if(e.key==='Escape'){overview.classList.remove('show');syncBurger()}else if(e.key.toLowerCase()==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()}
  else if(e.key.toLowerCase()==='p'){e.preventDefault();window.ptToggle&&window.ptToggle()}else if(e.key.toLowerCase()==='t'){window.ptHide&&window.ptHide()}});
let tx=0;stage.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{if(modal.classList.contains('show'))return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>60){dx<0?next():prev()}});
let wlock=false;stage.addEventListener('wheel',e=>{if(modal.classList.contains('show'))return;if(wlock)return;if(Math.abs(e.deltaY)<24&&Math.abs(e.deltaX)<24)return;wlock=true;(e.deltaY>0||e.deltaX>0)?next():prev();setTimeout(()=>wlock=false,700)},{passive:true});

/* ===== poll ===== */
document.querySelectorAll('.poll').forEach(poll=>{const opts=[...poll.querySelectorAll('.opt')];
  opts.forEach(opt=>opt.addEventListener('click',()=>{const sel=opts.indexOf(opt);const base=opts.map((_,i)=>8+(Math.sin((i+1)*9.7)+1)*9);base[sel]+=42;const sum=base.reduce((a,b)=>a+b,0);
    opts.forEach((o,i)=>{const pct=Math.round(base[i]/sum*100);o.querySelector('.fill').style.width=pct+'%';o.querySelector('.pct').textContent=pct+'%'})}));});

/* ===== node network bg ===== */
(function(){const c=document.getElementById('net'),x=c.getContext('2d');let w,h,nodes;
  function size(){w=c.width=innerWidth;h=c.height=innerHeight;init()}
  function init(){const count=Math.min(80,Math.floor(w*h/26000));nodes=Array.from({length:count},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.6+.5,o:Math.random()}))}
  function loop(){x.clearRect(0,0,w,h);for(let i=0;i<nodes.length;i++){const n=nodes[i];n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>w)n.vx*=-1;if(n.y<0||n.y>h)n.vy*=-1;
    for(let j=i+1;j<nodes.length;j++){const m=nodes[j],dx=n.x-m.x,dy=n.y-m.y,d=dx*dx+dy*dy;if(d<20000){const a=(1-d/20000)*.3;x.strokeStyle='rgba(42,164,244,'+a+')';x.lineWidth=.6;x.beginPath();x.moveTo(n.x,n.y);x.lineTo(m.x,m.y);x.stroke()}}}
    for(const n of nodes){x.beginPath();x.arc(n.x,n.y,n.r,0,7);x.fillStyle=n.o>.86?'rgba(247,121,31,.75)':'rgba(42,164,244,.6)';x.fill()}requestAnimationFrame(loop)}
  addEventListener('resize',size);size();loop();})();
